<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/login.css">
    <title>LakbayLokal - LogIn</title>
</head>
<body>
    <div class="image-side">
        <img src="Login image.png" alt="Travel">
        <div class="image-overlay">
            <h1>Discover Local Wonders</h1>
            <p>One city at a time.</p>
        </div>
    </div>

    <div class="login-side">
        <div class="brand">
            <img src="labayLogoFinal.jpg" alt="Logo">
            <span>LakbayLokal</span>
        </div>

        <h2 class="login-heading">Sign in</h2>
        <p class="login-sub">Welcome back. Let's explore.</p>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••">
        </div>

        <div class="forgot">
            <a href="#">Forgot password?</a>
        </div>

        <button class="btn-login">Sign In</button>

        <p class="register">No account? <a href="#">Register</a></p>
    </div>

    
</body>
</html>
