<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>LakbayLokal - Profile</title>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-section">
            <div class="logo">🗺️</div>
            <h1>LakbayLokal</h1>
        </div>
        
        <div class="search-section">
            <form id="search" class="search-form">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="formsearch" name="search" placeholder="Search profiles...">
            </form>
        </div>

        <div class="actions">
            <button class="notification-btn" title="Notifications" id="notification-toggle">🔔</button>
            <!--notification card for notificcation button-->
            <div class="notification-card hidden" id="notification-card">
                 <div class="notification-header">
                    <h3>Notifications</h3>
                    <button class="notification-close" id="notification-close"></button>
                 </div>  
                <div class="notification-list" id="notification-list">
                <div class="notification-empty">
                    <p>No notifications yet</p>
                </div>
            </div>
                </div>
            <button class="profile-btn" title="Profile"><a href="profile.html" style="text-decoration: none; color: inherit;">👤</a></button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <a href="home.html" class="nav-link">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Home</span>
                </a>
                <a href="maps.html" class="nav-link">
                    <span class="nav-icon">🗺️</span>
                    <span class="nav-text">Explore Maps</span>
                </a>
                <a href="booking.html" class="nav-link">
                    <span class="nav-icon">✈️</span>
                    <span class="nav-text">Bookings</span>
                </a>
                <a href="bucketList.html" class="nav-link">
                    <span class="nav-icon">🎯</span>
                    <span class="nav-text">Bucket List</span>
                </a>
                <a href="Community.html" class="nav-link">
                    <span class="nav-icon">👥</span>
                    <span class="nav-text">Communities</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="cover-photo">
                <div id="profile-photo"></div>
                <button class="edit-profile-btn" id="editProfileBtn">✏️ Edit Profile</button>
            </div>

            <!-- Profile Info Section -->
            <div class="profile-info">
                <h1 id="profileUsername">Karl Alden Gaac</h1>
                <p id="profileBio">Travel enthusiast | Adventure seeker | Exploring the world one destination at a time</p>
            </div>

            <!-- Post Composer Container -->
            <div class="post-composer">
                <!-- Profile Section -->
                <div class="post-composer-top">
                    <div class="post-profile-pic">👤</div>
                    <input type="text" class="post-input-field" id="postComposerInput" placeholder="What's on your mind?">
                </div>

                <!-- Action Buttons -->
                <div class="post-actions">
                    <button class="post-action-btn" data-action="text">
                        <span class="action-icon">✍️</span>
                        <span>Text</span>
                    </button>
                    <button class="post-action-btn" data-action="photo">
                        <span class="action-icon">📷</span>
                        <span>Photo/Video</span>
                    </button>
                    <button class="post-action-btn" data-action="life">
                        <span class="action-icon">🎯</span>
                        <span>Life Update</span>
                    </button>
                </div>

                <!-- Hidden Forms for submissions -->
                <form id="postForm" class="hidden-post-form" style="display: none;">
                    <textarea id="formText" placeholder="What's on your mind?"></textarea>
                    <button type="submit" class="post-submit-btn">Post</button>
                </form>

                <form id="photoUploadForm" class="hidden-post-form" style="display: none;">
                    <div class="upload-input-wrapper">
                        <label for="photoInput" class="upload-label">
                            <div class="upload-icon">📷</div>
                            <span>Choose Photo</span>
                        </label>
                        <input type="file" id="photoInput" name="photo" accept="image/*" class="photo-input">
                    </div>
                    <div class="preview-container" id="previewContainer" style="display: none;">
                        <img id="photoPreview" src="" alt="Preview" class="photo-preview">
                        <button type="button" class="remove-photo-btn" id="removePhotoBtn">✕</button>
                    </div>
                    <textarea id="captionInput" name="caption" placeholder="Write a caption..."></textarea>
                    <button type="submit" class="post-submit-btn">Post Photo</button>
                </form>
            </div>

            <!-- Edit Profile Modal -->
            <div class="edit-profile-modal hidden" id="editProfileModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Edit Profile</h2>
                        <button class="modal-close" id="closeEditModal">✕</button>
                    </div>

                    <form id="editProfileForm" class="edit-profile-form">
                        <!-- Username Section -->
                        <div class="form-group">
                            <label for="usernameInput">Username</label>
                            <input type="text" id="usernameInput" class="form-input" placeholder="Enter your username">
                        </div>

                        <!-- Cover Photo Section -->
                        <div class="form-group">
                            <label>Cover Photo</label>
                            <div class="photo-upload-area">
                                <label for="coverPhotoInput" class="photo-upload-label">
                                    <span class="upload-text">Choose Cover Photo</span>
                                </label>
                                <input type="file" id="coverPhotoInput" accept="image/*" class="photo-input-hidden">
                                <div class="cover-preview-container" id="coverPreviewContainer" style="display: none;">
                                    <img id="coverPreview" src="" alt="Cover Preview" class="cover-preview">
                                    <button type="button" class="remove-photo-btn">✕</button>
                                </div>
                            </div>
                        </div>

                        <!-- Profile Picture Section -->
                        <div class="form-group">
                            <label>Profile Picture</label>
                            <div class="photo-upload-area">
                                <label for="profilePhotoInput" class="photo-upload-label">
                                    <span class="upload-text">Choose Profile Picture</span>
                                </label>
                                <input type="file" id="profilePhotoInput" accept="image/*" class="photo-input-hidden">
                                <div class="profile-preview-container" id="profilePreviewContainer" style="display: none;">
                                    <img id="profilePreview" src="" alt="Profile Preview" class="profile-preview">
                                    <button type="button" class="remove-photo-btn">✕</button>
                                </div>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="form-actions">
                            <button type="button" class="btn-cancel" id="cancelEditBtn">Cancel</button>
                            <button type="submit" class="btn-save">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../scripts/home.js"></script>
</body>
</html>
