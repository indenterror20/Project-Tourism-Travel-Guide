<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/signUp.css">
    <title>LakbayLokal - Sign Up</title>
</head>
<body>
    <div class="signup-container">
        <div class="signup-left">
            <h2 class="welcome-heading">Come join us!</h2>
            <p class="welcome-text">We are so excited to have you here! By joining our community, you'll gain access to exclusive offers, rewards, and discounts.</p>
            <p class="existing-account">Already have an account? <a href="login.html">Sign in.</a></p>
        </div>

        <div class="signup-right">
            <h2 class="signup-heading">Signup</h2>

            <div class="form-group">
                <label>By/Nickname</label>
                <input type="text" id="username" placeholder="">
                <span id="usernameError" style="color:red"></span>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="">
                <span id="emailError" style="color:red"></span>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="">
                <span id="passwordError" style="color:red"></span>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="">
                <span id="confirmPassError" style="color:red"></span>
            </div>

            <button class="btn-signup"><a href="home.html">Signup</a></button>
        </div>
    </div>
    <script src="../scripts/signup.js"></script>
</body>
</html>
