<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/signUp.css">
    <title>LakbayLokal - Sign Up</title>
</head>
<body>
    <div class="signup-side">
        <div class="brand">
            <img src="../images/labayLogoFinal.jpg" alt="Logo">
            <h2>LakbayLokal</h2>
        </div>

        <h2 class="signup-heading">Create Account</h2>
        <p class="signup-sub">Join us. Start exploring.</p>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="choose your username">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="••••••••">
        </div>

        <button class="btn-signup"><a href="home.html">Sign Up</a></button>

        <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
    </div>
</body>
</html>
