<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/login.css">
    <title>LakbayLokal - LogIn</title>
</head>
<body>
    <div class="login-side">
        <div class="brand">
            <img src="../images/labayLogoFinal.jpg" alt="Logo">
            <h2>LakbayLokal</h2>
        </div>

        <h2 class="login-heading">Sign in</h2>
        <p class="login-sub">Welcome back. Let's explore.</p>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••">
        </div>

        <div class="forgot">
            <a href="#">Forgot password?</a>
        </div>

        <button class="btn-login"><a href="home.html">LogIn</a></button>

        <p class="register">No account? <a href="signUp.html">Register</a></p>
    </div>
</body>
</html>
